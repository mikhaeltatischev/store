# application-prod.yml
spring:
  application:
    name: Product Service

  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
    open-in-view: false

  jackson:
    serialization:
      indent-output: true
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    org.rus: DEBUG
    org.springframework: INFO
    org.springframework.web: WARN
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: DEBUG
    org.springdoc: INFO
    io.swagger: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %level - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %level - %msg%n"
  file:
    name: logs/product-service.log
    max-size: 10MB
    max-history: 30

# Swagger OpenAPI
springdoc:
  api-docs:
    enabled: false  # Отключает /api-docs endpoint
  swagger-ui:
    enabled: false  # Отключает Swagger UI
    path: /swagger-ui.html